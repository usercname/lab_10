name: CI/CD Pipeline

on:
  push:
    branches: [dev, qa, main]
  pull_request:
    branches: [dev, qa, main]

env:
  PHP_VERSION: '8.3'
  COMPOSER_VERSION: '2'

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, ctype, fileinfo, json, mbstring, pdo, tokenizer, xml, sqlite, pdo_sqlite
          coverage: xdebug
          tools: composer:${{ env.COMPOSER_VERSION }}
          ini-values: date.timezone=UTC

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Setup CI environment
        run: |
          cp .env.ci .env
          if ! grep -q "^APP_KEY=" .env; then
            echo "APP_KEY=base64:TCOv1kY8VqKJZL7xKqVqVqVqVqVqVqVqVqVqVqVqVqA=" >> .env
          fi
          php artisan config:clear
          php artisan cache:clear

      - name: Run migrations
        run: php artisan migrate:refresh --force

      - name: Run tests with coverage
        run: |
          vendor/bin/phpunit

      - name: Static Analysis (PHPStan/Larastan)
        run: |
          vendor/bin/phpstan analyse \
            --level=max \
            --error-format=github \
            --no-progress \
            --memory-limit=1G \
            app/

      - name: Linting (Laravel Pint)
        run: |
          vendor/bin/pint --test --verbose

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            coverage.xml
            report.xml
          retention-days: 7

  simulate-deploy:
    runs-on: ubuntu-latest
    needs: test-and-analyze
    if: success() && github.event_name == 'push'

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || github.ref_name == 'qa' && 'staging' || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, ctype, fileinfo, json, mbstring, pdo, tokenizer, xml, sqlite

      - name: Install Composer dependencies (prod)
        run: composer install --prefer-dist --no-interaction --no-progress --no-dev

      - name: Determine environment
        id: env
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "ENV=prod" >> $GITHUB_OUTPUT
              echo "ENV_NAME=Production" >> $GITHUB_OUTPUT
              echo "ENV_FILE=.env.prod" >> $GITHUB_OUTPUT
              ;;
            qa)
              echo "ENV=uat" >> $GITHUB_OUTPUT
              echo "ENV_NAME=UAT" >> $GITHUB_OUTPUT
              echo "ENV_FILE=.env.uat" >> $GITHUB_OUTPUT
              ;;
            dev)
              echo "ENV=dev" >> $GITHUB_OUTPUT
              echo "ENV_NAME=Development" >> $GITHUB_OUTPUT
              echo "ENV_FILE=.env.dev" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "ENV=unknown" >> $GITHUB_OUTPUT
              echo "ENV_NAME=Unknown" >> $GITHUB_OUTPUT
              echo "ENV_FILE=.env.ci" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Copy environment file
        run: |
          if [ -f "${{ steps.env.outputs.ENV_FILE }}" ]; then
            cp "${{ steps.env.outputs.ENV_FILE }}" .env
            echo "Loaded ${{ steps.env.outputs.ENV_FILE }}"
          else
            echo "File ${{ steps.env.outputs.ENV_FILE }} not found, using .env.example"
            cp .env.example .env
          fi
          echo "APP_URL=$(grep '^APP_URL=' .env | cut -d= -f2 || echo 'not set')"
          echo "DB_DATABASE=$(grep '^DB_DATABASE=' .env | cut -d= -f2 || echo 'not set')"

      - name: Deploy simulation message
        run: |
          echo "Deploying to [${{ steps.env.outputs.ENV }}] with ${{ steps.env.outputs.ENV_FILE }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"

  notify:
    runs-on: ubuntu-latest
    needs: [test-and-analyze, simulate-deploy]
    if: always() && github.event_name == 'push'

    steps:
      - name: Check pipeline status
        id: status
        run: |
          if [ "${{ needs.test-and-analyze.result }}" == "success" ] && [ "${{ needs.simulate-deploy.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=Pipeline completed successfully" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Pipeline failed" >> $GITHUB_OUTPUT
          fi

      - name: Log result
        run: |
          echo "${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.message }} for branch: ${{ github.ref_name }}"
          if [ "${{ steps.status.outputs.status }}" == "failed" ]; then
            echo "Check the workflow run for details"
            exit 1
          fi